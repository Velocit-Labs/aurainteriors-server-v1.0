# fly.toml app configuration
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "aura-interiors-backend"
primary_region = "sin"  # Singapore - adjust based on your users' location

[build]
  builder = "heroku"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 3001
  processes = ["app"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Restart policy
[[processes]]
  name = "app"
  cmd = "npm start"
  auto_restart = true
